<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coming Soon</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#F6F4EE;
    --primary:#234B43;
    --secondary:#4A7C6A;
    --text:#1E293B;
    --card:rgba(255,255,255,.80);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Roboto',sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

.hero{
    text-align:center;
    padding:40px 20px;
}

.hero h1{
    font-size:2.7rem;
    color:var(--primary);
}

.hero p{
    margin-top:10px;
    color:#64748b;
    font-size:1.05rem;
}

.main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{

    width:100%;
    max-width:700px;

    background:var(--card);
    backdrop-filter:blur(14px);

    border-radius:24px;

    padding:60px 40px;

    text-align:center;

    box-shadow:0 10px 30px rgba(0,0,0,.05);

    transition:
        transform .35s ease,
        box-shadow .35s ease,
        background .35s ease;
}

.card:hover{

    transform:translateY(-8px) scale(1.02);

    box-shadow:0 24px 50px rgba(35,75,67,.18);

    background:rgba(255,255,255,.92);

}

.icon{

    font-size:70px;

    margin-bottom:20px;

}

.title{

    font-size:2.8rem;

    color:var(--primary);

    font-weight:700;

    letter-spacing:2px;

}

.subtitle{

    margin-top:25px;

    font-size:1.1rem;

    line-height:1.8;

    color:#64748b;

}

.dots{

    display:flex;

    justify-content:center;

    gap:12px;

    margin-top:35px;

}

.dots span{

    width:12px;

    height:12px;

    border-radius:50%;

    background:var(--primary);

    animation:bounce 1.4s infinite;

}

.dots span:nth-child(2){

    animation-delay:.2s;

}

.dots span:nth-child(3){

    animation-delay:.4s;

}

@keyframes bounce{

0%,80%,100%{

transform:scale(.6);

opacity:.4;

}

40%{

transform:scale(1.3);

opacity:1;

}

}

footer{

    margin-top:auto;

    text-align:center;

    padding:40px 0 20px;

}

.footer-logo{

    width:50px;

    opacity:.9;

}

@media(max-width:768px){

.hero h1{

font-size:2rem;

}

.card{

padding:40px 25px;

}

.title{

font-size:2rem;

}

.icon{

font-size:55px;

}

.subtitle{

font-size:1rem;

}

}

</style>

</head>

<body>

<div class="container">

<div class="hero">

<h1>Get Together 2026</h1>

<p></p>

</div>

<div class="main">

<div class="card">

<div class="icon">🚧</div>

<div class="title">

COMING SOON...

</div>

<div class="subtitle">

Something exciting is on the way!

<br><br>

Please check back again soon.

</div>

<div class="dots">

<span></span>

<span></span>

<span></span>

</div>

</div>

</div>

<footer>

<img src="logo.png" class="footer-logo" alt="Logo">

</footer>

</div>

</body>
</html>
