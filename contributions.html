<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contributions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#F6F4EE;
  --primary:#234B43;
  --secondary:#4A7C6A;
  --text:#1E293B;
  --success:#2E7D32;
  --warning:#C28A00;
  --pending:#8A8A8A;
  --card:rgba(255,255,255,.78);
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Roboto',sans-serif}
body{background:var(--bg);color:var(--text);padding:20px}
.container{max-width:1200px;margin:auto}
.hero{text-align:center;padding:40px 20px}
.hero h1{font-size:2.6rem;color:var(--primary)}
.hero p{margin-top:10px;color:#64748b}
.live{display:inline-flex;align-items:center;gap:8px;margin-top:15px;color:var(--success);font-weight:500}
.live-dot{width:10px;height:10px;border-radius:50%;background:var(--success);animation:pulse 1.5s infinite}
@keyframes pulse{50%{transform:scale(1.4)}}

.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;margin-top:25px}
.card{background:var(--card);backdrop-filter:blur(14px);border-radius:20px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.05)}
.card-value{font-size:2rem;font-weight:700;color:var(--primary)}
.card-label{margin-top:8px;color:#64748b}

.progress-section{display:flex;justify-content:center;margin-top:35px}
.progress-ring{width:220px;height:220px;position:relative}
.progress-ring svg{transform:rotate(-90deg)}
.progress-text{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center}
.progress-text h2{font-size:2rem;color:var(--primary)}

.search-box{margin-top:40px}
.search-box input{width:100%;padding:16px;border:none;border-radius:16px;box-shadow:0 4px 15px rgba(0,0,0,.05)}
.section-title{margin:40px 0 20px;color:var(--primary)}

.family-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.family-card{background:white;border-radius:18px;padding:20px;box-shadow:0 5px 20px rgba(0,0,0,.05)}
.family-name{font-size:1.1rem;font-weight:600}
.amount{margin-top:12px;font-size:1.8rem;color:var(--primary)}
.badge{display:inline-block;margin-top:14px;padding:6px 14px;border-radius:999px;color:white;font-size:.85rem}
.paid{background:var(--success)}
.partial{background:var(--warning)}
.pending{background:var(--pending)}

.timeline-item{background:white;padding:16px;border-radius:14px;margin-bottom:12px;box-shadow:0 4px 12px rgba(0,0,0,.04)}
.timeline-date{font-size:.9rem;color:#64748b}
.timeline-text{margin-top:6px}

footer{text-align:center;margin-top:60px;padding-bottom:20px}
.footer-logo{height:50px;width:auto;opacity:.9}
</style>
</head>
<body>
<div class="container">

<div class="hero">
<h1>Get-together 2026</h1>
<p>Contributions</p>
<div class="live"><span class="live-dot"></span>LIVE</div>
</div>

<div class="summary">
<div class="card"><div id="collected" class="card-value">₹0</div><div class="card-label">Collected</div></div>
<div class="card"><div id="pending" class="card-value">₹0</div><div class="card-label">Pending</div></div>
<div class="card"><div id="families" class="card-value">0 / 0</div><div class="card-label">Families Paid</div></div>
</div>

<div class="progress-section">
<div class="progress-ring">
<svg width="220" height="220">
<circle cx="110" cy="110" r="90" stroke="#e5e7eb" stroke-width="14" fill="none"/>
<circle id="progressCircle" cx="110" cy="110" r="90" stroke="#234B43" stroke-width="14" fill="none" stroke-linecap="round" stroke-dasharray="565" stroke-dashoffset="565"/>
</svg>
<div class="progress-text">
<h2 id="percent">0%</h2>
<p>Progress</p>
</div>
</div>
</div>

<div class="search-box">
<input type="text" id="search" placeholder="🔍︎ Search family...">
</div>

<h2 class="section-title">Contributors</h2>
<div class="family-grid" id="familyGrid"></div>

<section class="timeline-section">
<h2 class="section-title">Recent Activity</h2>
<div id="timelineContainer"></div>
</section>

<footer>
<img src="logo.png" alt="Logo" class="footer-logo">
</footer>

</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/1qTkwlWyNS2w9KrJizZiJB5hzr17G5uGFt20vMf0p1-8/export?format=csv&gid=0";
let allContributors=[];

async function loadData(){
  if(CSV_URL.includes("PASTE_YOUR")) return;
  const response = await fetch(CSV_URL + "&t=" + Date.now());
  const csv = await response.text();

  const rows = csv
    .trim()
    .split(/\r?\n/)
    .filter(row => row
      .trim() !== "")
    .slice(1);

  allContributors = rows.map(row=>{
    const cols=row.split(",");
    return {
      id:Number(cols[0]),
      family:(cols[1]||"").trim(),
      expected:Number(cols[2])||0,
      paid:Number(cols[3])||0,
      datePaid:(cols[4]||"").trim(),
      remarks:(cols[5]||"").trim()
    };
  });

  renderEverything();
}

function renderEverything(){
  renderSummary();
  renderContributors(allContributors);
  renderTimeline();
  updateProgress();
}

function renderSummary(){
  const collected=allContributors.reduce((s,c)=>s+c.paid,0);
  const expected=allContributors.reduce((s,c)=>s+c.expected,0);
  const pending=expected-collected;
  const paidFamilies=allContributors.filter(c=>c.expected>0 && c.paid>=c.expected).length;

  document.getElementById("collected").textContent=`₹${collected.toLocaleString()}`;
  document.getElementById("pending").textContent=`₹${pending.toLocaleString()}`;
  document.getElementById("families").textContent=`${paidFamilies} / ${allContributors.length}`;
}

function renderContributors(data){
  const grid=document.getElementById("familyGrid");
  grid.innerHTML="";
  data.forEach(c=>{
    let status="Pending";
    if(c.expected>0 && c.paid>=c.expected) status="Paid";
    else if(c.paid>0) status="Partial";

    grid.innerHTML += `
      <div class="family-card">
        <div class="family-name">${c.family}</div>
        <div class="amount">₹${c.paid.toLocaleString()}</div>
        <span class="badge ${status.toLowerCase()}">${status}</span>
      </div>`;
  });
}

function renderTimeline(){
  const timeline=document.getElementById("timelineContainer");
  timeline.innerHTML="";

  allContributors
    .filter(c=>c.datePaid)
    .sort((a,b)=>new Date(b.datePaid)-new Date(a.datePaid))
    .slice(0,10)
    .forEach(c=>{
      timeline.innerHTML += `
      <div class="timeline-item">
        <div class="timeline-date">${c.datePaid}</div>
        <div class="timeline-text">${c.family} contributed ₹${c.paid.toLocaleString()}</div>
      </div>`;
    });
}

function updateProgress(){
  const collected=allContributors.reduce((s,c)=>s+c.paid,0);
  const expected=allContributors.reduce((s,c)=>s+c.expected,0);
  const percentage = expected ? Math.round((collected/expected)*100) : 0;

  document.getElementById("percent").textContent = percentage + "%";

  const circumference=565;
  const offset=circumference-(percentage/100)*circumference;
  document.getElementById("progressCircle").style.strokeDashoffset=offset;
}

document.getElementById("search").addEventListener("input",e=>{
  const term=e.target.value.toLowerCase();
  renderContributors(
    allContributors.filter(c=>c.family.toLowerCase().includes(term))
  );
});

loadData();
  setInterval(loadData, 60000);
</script>
</body>
</html>
