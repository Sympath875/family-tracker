<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RoK 2026</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#F6F4EE;
    --primary:#234B43;
    --secondary:#4A7C6A;
    --text:#1E293B;
    --success:#2E7D32;
    --warning:#C28A00;
    --pending:#8A8A8A;
    --card:rgba(255,255,255,.78);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:var(--bg);
    color:var(--text);
    padding:20px;
}

.container{
    max-width:1200px;
    margin:auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

.hero{
    text-align:center;
    padding:35px 20px;
}

.hero h1{
    font-size:2.7rem;
    color:var(--primary);
}

.hero p{
    margin-top:10px;
    color:#64748b;
    font-size:1.1rem;
}

.summary{

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:20px;

    margin-top:30px;

}

.card{

    background:var(--card);

    backdrop-filter:blur(14px);

    border-radius:20px;

    padding:28px;

    box-shadow:0 10px 30px rgba(0,0,0,.05);

    transition:
        transform .35s ease,
        box-shadow .35s ease,
        background .35s ease;

}

.card:hover{

    transform:translateY(-8px) scale(1.02);

    box-shadow:0 24px 50px rgba(35,75,67,.18);

    background:rgba(255,255,255,.9);

}

.card-value{

    font-size:2.3rem;

    font-weight:700;

}

.card-label{

    margin-top:8px;

    color:#64748b;

}

.collected{

    color:var(--primary);

}

.expenses{

    color:#C0392B;

}

.balance{

    color:var(--success);

}

.pending{

    color:var(--warning);

}

.bottom{

    margin-top:auto;

    text-align:center;

    padding-top:60px;

}

.last-updated{

    color:#64748b;

    margin-bottom:18px;

    font-size:.95rem;

}

.footer-logo{

    width:120px;

    opacity:.9;

}

@media(max-width:768px){

.summary{

grid-template-columns:1fr;

}

.hero h1{

font-size:2rem;

}

.card-value{

font-size:1.9rem;

}

}

</style>

</head>

<body>

<div class="container">

<div class="hero">

<h1>Get Together 2026</h1>

<p>Summary</p>

</div>

<div class="summary">

<div class="card">

<div id="collected" class="card-value collected">₹0</div>

<div class="card-label">

Collected

</div>

</div>

<div class="card">

<div id="expenses" class="card-value expenses">₹0</div>

<div class="card-label">

Expenses

</div>

</div>

<div class="card">

<div id="balance" class="card-value balance">₹0</div>

<div class="card-label">

Balance

</div>

</div>

<div class="card">

<div id="pending" class="card-value pending">₹0</div>

<div class="card-label">

Pending

</div>

</div>

</div>

<div class="bottom">

<div id="lastUpdated" class="last-updated">

Last updated : --

</div>

<footer>

<img src="logo.png" class="footer-logo">

</footer>

</div>

</div>

<script>

/* =============================

Contribution Sheet

Column A : ID
Column B : Family
Column C : Expected Amount
Column D : Paid Amount

============================= */

const CONTRIBUTION_URL =
"https://docs.google.com/spreadsheets/d/1qTkwlWyNS2w9KrJizZiJB5hzr17G5uGFt20vMf0p1-8/export?format=csv&gid=0";

/* =============================

Expense Sheet

Column A : Purpose
Column B : Amount

============================= */

const EXPENSE_URL =
"https://docs.google.com/spreadsheets/d/1qTkwlWyNS2w9KrJizZiJB5hzr17G5uGFt20vMf0p1-8/export?format=csv&gid=1425930218";

async function loadData(){

if(
CONTRIBUTION_URL.includes("PASTE") ||
EXPENSE_URL.includes("PASTE")
){
updateTime();
return;
}

const [c,e] = await Promise.all([
fetch(CONTRIBUTION_URL + "&t=" + Date.now()),
fetch(EXPENSE_URL + "&t=" + Date.now())
]);

const contributionCSV =
await c.text();

const expenseCSV =
await e.text();

const contributionRows =
contributionCSV
.trim()
.split(/\r?\n/)
.slice(1)
.filter(r=>r.trim()!="");

const expenseRows =
expenseCSV
.trim()
.split(/\r?\n/)
.slice(1)
.filter(r=>r.trim()!="");

let collected = 0;
let expected = 0;

contributionRows.forEach(row=>{

const cols = row.split(",");

expected += Number(cols[2]) || 0;

collected += Number(cols[3]) || 0;

});

let expenses = 0;

expenseRows.forEach(row=>{

const cols = row.split(",");

expenses += Number(cols[1]) || 0;

});

const balance =

collected - expenses;

const pending =

expected - collected;

document.getElementById("collected").textContent =
"₹" + collected.toLocaleString();

document.getElementById("expenses").textContent =
"₹" + expenses.toLocaleString();

document.getElementById("balance").textContent =
"₹" + balance.toLocaleString();

document.getElementById("pending").textContent =
"₹" + pending.toLocaleString();

updateTime();

}

function updateTime(){

document.getElementById("lastUpdated").textContent =
"Last updated : " +
new Date().toLocaleString();

}

loadData();

setInterval(loadData,60000);

</script>

</body>
</html>
