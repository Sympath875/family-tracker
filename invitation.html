<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RoK 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#F6F4EE;
--primary:#234B43;
--secondary:#4A7C6A;
--text:#1E293B;
--card:rgba(255,255,255,.78);}

*{box-sizing:border-box}
body{margin:0;font-family:Poppins,sans-serif;background:radial-gradient(circle at top,rgba(74,124,106,.08),transparent 45%),var(--bg);color:var(--text);display:flex;justify-content:center}
.container{max-width:900px;width:100%;padding:60px 20px;text-align:center}
h1{color:var(--primary);font-size:3rem;margin:0}
.subtitle{color:var(--secondary);letter-spacing:3px;text-transform:none;margin:10px 0 40px}
.invitation-card{width:min(420px,90vw);border-radius:22px;box-shadow:0 15px 45px rgba(0,0,0,.18);transition:.3s}
.invitation-card:hover{transform:translateY(-6px)}
.buttons{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:28px}
.btn{padding:12px 20px;border-radius:16px;background:var(--card);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.45);text-decoration:none;color:var(--primary);font-weight:bold}
@media(max-width:700px){.item{grid-template-columns:1fr}.time{text-align:left;padding-left:10px}}
footer{text-align:center;margin-top:60px;padding-bottom:20px}
.footer-logo{height:50px;width:auto;opacity:.9}

.page-blur{

    position:fixed;
    inset:0;

    backdrop-filter:blur(28px);
    -webkit-backdrop-filter:blur(28px);

    background:rgba(246,244,238,0.18);

    z-index:9999;

    pointer-events:all;

}
</style>
</head>

<body>
<div class="container">
<h1>Get-together 2026</h1>
<div class="subtitle">Invitation</div>

<a href="invitation.png" target="_blank">
<img class="invitation-card" src="invitation.png" alt="Invitation">
</a>

<div class="buttons">
<a class="btn" href="invitation.pdf" download>Download PDF</a>
<a class="btn" href="invitation.png" download>Download PNG</a>
</div>

<footer>
<img src="logo.png" alt="Logo" class="footer-logo">
</footer>

<div class="page-blur"></div>
    
</div>
</body>
</html>
