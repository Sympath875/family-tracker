
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Expenses - Get Together 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F6F4EE;--primary:#234B43;--card:rgba(255,255,255,.78);--green:#2E7D32;--red:#D95C5C}
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{background:var(--bg);padding:20px;color:#1E293B}
.container{max-width:1100px;margin:auto}
.hero{text-align:center;padding:25px 0 35px}
.hero h1{color:var(--primary)}
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;margin-bottom:30px}
.card{background:var(--card);backdrop-filter:blur(14px);padding:22px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.05)}
.card-value{font-size:2rem;font-weight:700}
.spent{color:var(--red)} .bal{color:var(--green)}
.committee{margin-bottom:28px}
.committee-header{display:flex;justify-content:space-between;align-items:center;margin:14px 0}
.committee-name{font-size:1.25rem;font-weight:700;color:var(--primary)}
.committee-total{font-weight:700}
details{background:white;border-radius:18px;padding:8px 18px;box-shadow:0 5px 20px rgba(0,0,0,.05)}
summary{cursor:pointer;list-style:none}
summary::-webkit-details-marker{display:none}
.expense{display:flex;justify-content:space-between;padding:14px 0;border-top:1px solid #eee}
.meta{font-size:.9rem;color:#64748b;margin-top:5px;display:flex;flex-direction:column;gap:3px}
.last{text-align:center;margin:30px 0 15px;color:#64748b}
footer{text-align:center}.footer-logo{height:50px}
</style>
</head>
<body>
<div class="container">
<div class="hero"><h1>Get-together 2026</h1><p>Expenses</p></div>
<div class="summary">
<div class="card"><div id="spent" class="card-value spent">₹0</div><div>Total Spent</div></div>
<div class="card"><div id="balance" class="card-value bal">₹0</div><div>Balance</div></div>
</div>
<div id="groups"></div>
<div id="last" class="last">Last Updated: --</div>
<footer><img src="logo.png" class="footer-logo"></footer>
</div>
<script>
const EXPENSE_URL="https://docs.google.com/spreadsheets/d/1qTkwlWyNS2w9KrJizZiJB5hzr17G5uGFt20vMf0p1-8/export?format=csv&gid=1425930218";
const CONTRIBUTION_URL="https://docs.google.com/spreadsheets/d/1qTkwlWyNS2w9KrJizZiJB5hzr17G5uGFt20vMf0p1-8/export?format=csv&gid=0";
let totalCollected=0;

async function csv(url){
 const t=await (await fetch(url+"&t="+Date.now())).text();
 return t.trim().split(/\r?\n/).slice(1).map(r=>r.split(","));
}
async function load(){
 const e=await csv(EXPENSE_URL);
 const c=await csv(CONTRIBUTION_URL);
 totalCollected=c.reduce((s,r)=>s+(Number(r[3])||0),0);
 const ex=e.map(r=>({purpose:r[0],amount:+r[1]||0,tag:r[2]||"Miscellaneous",paid:r[3]||"",mode:r[4]||"",date:r[5]||""}));
 render(ex);
}
function render(exp){
 const groups={};
 let spent=0;
 exp.forEach(x=>{spent+=x.amount;(groups[x.tag]??=[]).push(x);});
 document.getElementById("spent").textContent="₹"+spent.toLocaleString();
 document.getElementById("balance").textContent="₹"+(totalCollected-spent).toLocaleString();
 const out=document.getElementById("groups");out.innerHTML="";
 Object.keys(groups).forEach(tag=>{
  const subtotal=groups[tag].reduce((s,x)=>s+x.amount,0);
  let html=`<div class="committee"><div class="committee-header"><div class="committee-name">${tag}</div><div class="committee-total">₹${subtotal.toLocaleString()}</div></div><details open><summary>View Expenses</summary>`;
  groups[tag].forEach(x=>{
   html+=`<div class="expense"><div><strong>${x.purpose}</strong><div class="meta"><span>Paid To: ${x.paid}</span><span>Mode: ${x.mode}</span><span>Date: ${x.date}</span></div></div><strong>₹${x.amount.toLocaleString()}</strong></div>`;
  });
  html+="</details></div>";
  out.innerHTML+=html;
 });
 document.getElementById("last").textContent="Last Updated: "+new Date().toLocaleString("en-IN");
}
load();setInterval(load,60000);
</script>
</body>
</html>
