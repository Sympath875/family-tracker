<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Function Contribution Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ===================================================
       CSS RESET & BASE
    =================================================== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary:       #2F5D50;
      --secondary:     #4A7C6A;
      --bg:            #F5F3EE;
      --text:          #1F2937;
      --text-muted:    #6B7280;
      --success:       #2E7D32;
      --pending:       #C28A00;
      --glass:         rgba(255, 255, 255, 0.65);
      --glass-border:  rgba(255, 255, 255, 0.85);
      --shadow-sm:     0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md:     0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
      --radius:        12px;
      --radius-sm:     8px;
      --transition:    0.22s ease;
    }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: 'Roboto', system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      opacity: 0;
      animation: pageFadeIn 0.5s ease 0.1s forwards;
    }

    /* ===================================================
       PAGE FADE-IN
    =================================================== */
    @keyframes pageFadeIn {
      to { opacity: 1; }
    }

    /* ===================================================
       HEADER
    =================================================== */
    .site-header {
      background: var(--glass);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--glass-border);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-sm);
    }

    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .header-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Logo placeholder — swap with <img> when ready */
    .logo-placeholder {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: #fff;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.02em;
    }

    /* ===================================================
       MAIN CONTENT
    =================================================== */
    main {
      flex: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px 40px;
      width: 100%;
    }

    /* ===================================================
       ERROR BANNER
    =================================================== */
    .error-banner {
      display: none;
      align-items: center;
      gap: 10px;
      background: rgba(180, 83, 9, 0.08);
      border: 1px solid rgba(180, 83, 9, 0.22);
      border-radius: var(--radius-sm);
      padding: 11px 16px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      color: #92400E;
      line-height: 1.5;
    }

    .error-banner.visible { display: flex; }
    .error-icon { font-size: 1.1rem; flex-shrink: 0; }
    .error-banner strong { font-weight: 600; }

    /* ===================================================
       SUMMARY CARDS
    =================================================== */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .summary-card {
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 20px 22px;
      box-shadow: var(--shadow-sm);
      transition: transform var(--transition), box-shadow var(--transition);
      cursor: default;
    }

    .summary-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    .card-label {
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .card-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: -0.03em;
      line-height: 1.1;
    }

    .card-value.spent   { color: #B45309; }
    .card-value.pending { color: var(--pending); }
    .card-value.balance { color: var(--primary); }

    .card-sub {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ===================================================
       SKELETON SHIMMER — used inside cards & table
    =================================================== */
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skeleton-line {
      border-radius: 6px;
      background: linear-gradient(90deg,
        rgba(0,0,0,0.06) 25%,
        rgba(0,0,0,0.11) 50%,
        rgba(0,0,0,0.06) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease infinite;
      display: block;
    }

    .skeleton-value {
      height: 2rem;
      width: 68%;
      margin-bottom: 8px;
    }

    .skeleton-sub {
      height: 0.82rem;
      width: 48%;
    }

    .skeleton-cell {
      height: 1rem;
      border-radius: 4px;
      background: linear-gradient(90deg,
        rgba(0,0,0,0.05) 25%,
        rgba(0,0,0,0.09) 50%,
        rgba(0,0,0,0.05) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s ease infinite;
    }

    /* ===================================================
       SEARCH BAR
    =================================================== */
    .search-section {
      margin-bottom: 24px;
    }

    .search-wrap {
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      pointer-events: none;
      opacity: 0.5;
    }

    .search-input {
      width: 100%;
      padding: 12px 16px 12px 42px;
      font-family: 'Roboto', system-ui, sans-serif;
      font-size: 1rem;
      color: var(--text);
      background: var(--glass);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-sm);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
      appearance: none;
    }

    .search-input::placeholder { color: var(--text-muted); }

    .search-input:focus {
      border-color: var(--secondary);
      box-shadow: 0 0 0 3px rgba(47, 93, 80, 0.12);
    }

    /* Disable search while loading */
    .search-input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ===================================================
       CONTRIBUTORS TABLE SECTION
    =================================================== */
    .section-heading {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    .table-wrap {
      background: var(--glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 360px;
    }

    thead {
      background: rgba(47, 93, 80, 0.07);
      position: sticky;
      top: 68px; /* matches header height */
    }

    thead th {
      padding: 13px 16px;
      text-align: left;
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--primary);
      white-space: nowrap;
      border-bottom: 1px solid rgba(47, 93, 80, 0.12);
    }

    thead th:first-child { width: 52px; text-align: center; }
    thead th:nth-child(3) { text-align: right; }
    thead th:nth-child(4) { text-align: right; }
    thead th:last-child   { text-align: center; }

    tbody tr {
      border-bottom: 1px solid rgba(0,0,0,0.04);
      transition: background var(--transition);
    }

    tbody tr:last-child { border-bottom: none; }

    tbody tr:nth-child(even) {
      background: rgba(47, 93, 80, 0.025);
    }

    tbody tr:hover {
      background: rgba(47, 93, 80, 0.06);
    }

    tbody td {
      padding: 13px 16px;
      font-size: 1rem;
      color: var(--text);
      vertical-align: middle;
    }

    td:first-child {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.88rem;
      font-weight: 500;
    }

    td:nth-child(3) {
      text-align: right;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      color: var(--text-muted);
    }

    td:nth-child(4) {
      text-align: right;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    td:last-child { text-align: center; }

    /* Status badges */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .badge-paid {
      background: rgba(46, 125, 50, 0.12);
      color: var(--success);
      border: 1px solid rgba(46, 125, 50, 0.25);
    }

    .badge-partial {
      background: rgba(194, 138, 0, 0.12);
      color: var(--pending);
      border: 1px solid rgba(194, 138, 0, 0.25);
    }

    /* Empty / no-results row */
    .empty-row td {
      text-align: center;
      padding: 36px 16px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* ===================================================
       FOOTER
    =================================================== */
    .site-footer {
      border-top: 1px solid rgba(0,0,0,0.06);
      background: var(--glass);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .footer-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    .footer-credit {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .live-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--success);
      letter-spacing: 0.04em;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: livePulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes livePulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }

    /* ===================================================
       RESPONSIVE — MOBILE FIRST
    =================================================== */
    @media (max-width: 640px) {
      .summary-grid {
        grid-template-columns: 1fr;
      }

      .header-title {
        font-size: 0.95rem;
      }

      .card-value {
        font-size: 1.65rem;
      }
    }

    @media (min-width: 641px) and (max-width: 900px) {
      .summary-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    /* Reduced motion support */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body>

  <!-- ===================================================
       HEADER
  =================================================== -->
  <header class="site-header" role="banner">
    <div class="header-inner">
      <h1 class="header-title">Family Function Contribution Tracker</h1>
      <!-- Replace inner content with <img> when a logo is ready -->
      <div class="logo-placeholder" aria-label="Logo">FF</div>
    </div>
  </header>


  <!-- ===================================================
       MAIN
  =================================================== -->
  <main>

    <!-- ERROR BANNER — shown only on fetch failure -->
    <div class="error-banner" id="error-banner" role="alert" aria-live="polite">
      <span class="error-icon" aria-hidden="true">⚠️</span>
      <span id="error-text">
        <strong>Unable to load latest data.</strong> Showing the last successfully cached values.
      </span>
    </div>

    <!-- SUMMARY CARDS -->
    <section class="summary-grid" aria-label="Financial summary">

      <div class="summary-card" role="region" aria-labelledby="label-collected">
        <p class="card-label" id="label-collected">Collected</p>
        <p class="card-value" id="val-collected">
          <span class="skeleton-line skeleton-value" aria-hidden="true"></span>
        </p>
        <p class="card-sub" id="sub-collected">
          <span class="skeleton-line skeleton-sub" aria-hidden="true"></span>
        </p>
      </div>

      <div class="summary-card" role="region" aria-labelledby="label-spent">
        <p class="card-label" id="label-spent">Spent</p>
        <p class="card-value spent" id="val-spent">
          <span class="skeleton-line skeleton-value" aria-hidden="true"></span>
        </p>
        <p class="card-sub">total expenses</p>
      </div>

      <div class="summary-card" role="region" aria-labelledby="label-pending">
        <p class="card-label" id="label-pending">Pending</p>
        <p class="card-value pending" id="val-pending">
          <span class="skeleton-line skeleton-value" aria-hidden="true"></span>
        </p>
        <p class="card-sub" id="sub-pending">yet to collect</p>
      </div>

      <div class="summary-card" role="region" aria-labelledby="label-balance">
        <p class="card-label" id="label-balance">Balance</p>
        <p class="card-value balance" id="val-balance">
          <span class="skeleton-line skeleton-value" aria-hidden="true"></span>
        </p>
        <p class="card-sub">collected − spent</p>
      </div>

    </section>


    <!-- SEARCH -->
    <section class="search-section" aria-label="Search contributors">
      <div class="search-wrap">
        <span class="search-icon" aria-hidden="true">🔍</span>
        <input
          type="search"
          class="search-input"
          id="search-input"
          placeholder="Search family…"
          aria-label="Search family members"
          autocomplete="off"
          spellcheck="false"
          disabled
        />
      </div>
    </section>


    <!-- CONTRIBUTORS TABLE -->
    <section aria-label="Contributors list">
      <h2 class="section-heading">Contributors</h2>
      <div class="table-wrap">
        <table id="contributors-table" aria-label="Contribution table">
          <thead>
            <tr>
              <th scope="col">Sl No</th>
              <th scope="col">Family</th>
              <th scope="col">Expected</th>
              <th scope="col">Amount Paid</th>
              <th scope="col">Status</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <!-- Skeleton rows shown while loading -->
          </tbody>
        </table>
      </div>
    </section>

  </main>


  <!-- ===================================================
       FOOTER
  =================================================== -->
  <footer class="site-footer" role="contentinfo">
    <div class="footer-inner">
      <p class="footer-credit">Maintained by <strong>Sympath875</strong></p>
      <div class="live-indicator" aria-label="Live data">
        <span class="live-dot" aria-hidden="true"></span>
        LIVE
      </div>
    </div>
  </footer>


  <!-- ===================================================
       JAVASCRIPT
  =================================================== -->
  <script>
    /*
     * ================================================
     *  CONFIGURATION
     *  Replace the URL below with the deployed /exec
     *  URL of your Google Apps Script web app.
     *
     *  HOW TO DEPLOY (one-time setup)
     *  1. Open your Google Sheet → Extensions → Apps Script
     *  2. Paste the contents of Code.gs (provided separately)
     *  3. Deploy → New deployment → Web app
     *     Execute as: Me
     *     Who has access: Anyone
     *  4. Copy the /exec URL and paste it below.
     *
     *  SHEET STRUCTURE THE SCRIPT READS
     *  Sheet "Contributors"  (headers in row 1)
     *    A  Sl. No.
     *    B  Family of          ← displayed as "Family"
     *    C  Expected amount    ← displayed as "Expected"
     *    D  Amount paid        ← displayed as "Amount Paid"
     *    E  Date paid
     *    F  Remarks
     *
     *  Sheet "Expenses"  (headers in row 1)
     *    A  Sl. No.
     *    B  Date
     *    C  Item
     *    D  Amount
     *
     *  Sheet "Summary"  (A = label, B = value)
     *    Row 1  Collected
     *    Row 2  Spent
     *    Row 3  Pending
     *    Row 4  Balance
     *    Row 5  Families paid
     *
     *  STATUS LOGIC (computed by Apps Script)
     *    "Paid"    → Amount paid >= Expected amount
     *    "Partial" → Amount paid < Expected amount
     * ================================================
     */
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyW-f92ESfzgi5bewr_UDO3bt5ksTdDskVBDq7IOWb174z4rIbAwOz7ZN09SQ8nClSs/exec";

    /* localStorage key used for caching the last good response */
    const CACHE_KEY = "ffct_cache";

    /* ================================================
       STATE
    ================================================ */
    let allContributors      = [];
    let filteredContributors = [];

    /* ================================================
       UTILITY — format Indian Rupee
    ================================================ */
    function formatINR(amount) {
      return "₹" + Number(amount).toLocaleString("en-IN");
    }

    /* ================================================
       UTILITY — XSS protection
    ================================================ */
    function escapeHTML(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    /* ================================================
       LOADING STATE — show skeleton placeholders
    ================================================ */
    function showLoadingState() {
      /* Card skeletons */
      ["val-collected", "val-spent", "val-pending", "val-balance"].forEach(id => {
        const el = document.getElementById(id);
        el.innerHTML = '<span class="skeleton-line skeleton-value" aria-hidden="true"></span>';
      });
      document.getElementById("sub-collected").innerHTML =
        '<span class="skeleton-line skeleton-sub" aria-hidden="true"></span>';

      /* Table skeleton — 6 placeholder rows */
      const tbody = document.getElementById("table-body");
      const skeletonRows = Array.from({ length: 6 }, (_, i) => `
        <tr class="skeleton-row">
          <td><div class="skeleton-cell" style="width:24px;margin:0 auto"></div></td>
          <td><div class="skeleton-cell" style="width:${60 + (i % 3) * 15}%"></div></td>
          <td style="text-align:right"><div class="skeleton-cell" style="width:56px;margin-left:auto"></div></td>
          <td style="text-align:right"><div class="skeleton-cell" style="width:56px;margin-left:auto"></div></td>
          <td><div class="skeleton-cell" style="width:52px;margin:0 auto;border-radius:20px"></div></td>
        </tr>`).join("");
      tbody.innerHTML = skeletonRows;

      /* Disable search during load */
      document.getElementById("search-input").disabled = true;
    }

    /* ================================================
       ERROR BANNER
    ================================================ */
    function showErrorBanner(message) {
      const banner = document.getElementById("error-banner");
      document.getElementById("error-text").innerHTML =
        `<strong>Unable to load latest data.</strong> ${escapeHTML(message)}`;
      banner.classList.add("visible");
    }

    function hideErrorBanner() {
      document.getElementById("error-banner").classList.remove("visible");
    }

    /* ================================================
       CACHE — read / write via localStorage
    ================================================ */
    function readCache() {
      try {
        const raw = localStorage.getItem(CACHE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch { return null; }
    }

    function writeCache(payload) {
      try {
        localStorage.setItem(CACHE_KEY, JSON.stringify(payload));
      } catch { /* storage quota exceeded — silently skip */ }
    }

    /* ================================================
       COUNT-UP ANIMATION
    ================================================ */
    function animateCount(element, targetValue, duration = 900) {
      const start    = performance.now();
      const startVal = 0;

      function step(now) {
        const elapsed  = now - start;
        const progress = Math.min(elapsed / duration, 1);
        const eased    = 1 - Math.pow(1 - progress, 3); /* ease-out cubic */
        const current  = Math.round(startVal + (targetValue - startVal) * eased);
        element.textContent = "₹" + Number(current).toLocaleString("en-IN");
        if (progress < 1) requestAnimationFrame(step);
      }

      requestAnimationFrame(step);
    }

    /* ================================================
       RENDER SUMMARY CARDS
    ================================================ */
    function renderSummary(payload) {
      const collected    = payload.collected    || 0;
      const spent        = payload.spent        || 0;
      const pending      = payload.pending      || 0;
      const balance      = payload.balance      !== undefined
                             ? payload.balance
                             : collected - spent;
      const familiesPaid = payload.familiesPaid  !== undefined
                             ? payload.familiesPaid
                             : (payload.contributors || []).filter(c => c.status === "Paid").length;
      const total        = payload.totalFamilies !== undefined
                             ? payload.totalFamilies
                             : (payload.contributors || []).length;

      animateCount(document.getElementById("val-collected"), collected);
      animateCount(document.getElementById("val-spent"),     spent);
      animateCount(document.getElementById("val-pending"),   pending);
      animateCount(document.getElementById("val-balance"),   balance);

      document.getElementById("sub-collected").textContent =
        familiesPaid + " of " + total + " families";
    }

    /* ================================================
       RENDER TABLE ROWS
    ================================================ */
    function renderTable(data) {
      const tbody = document.getElementById("table-body");

      if (!data || data.length === 0) {
        tbody.innerHTML = `
          <tr class="empty-row">
            <td colspan="5">No contributors found.</td>
          </tr>`;
        return;
      }

      const html = data.map((c, idx) => {
        const isPaid      = c.status === "Paid";
        const badgeCls    = isPaid ? "badge badge-paid" : "badge badge-partial";
        const label       = isPaid ? "Paid" : "Partial";
        const paidText    = c.paid > 0 ? formatINR(c.paid) : "—";
        const expectedText = c.expectedAmount > 0 ? formatINR(c.expectedAmount) : "—";

        return `
          <tr>
            <td>${idx + 1}</td>
            <td>${escapeHTML(c.family)}</td>
            <td>${expectedText}</td>
            <td>${paidText}</td>
            <td><span class="${badgeCls}">${label}</span></td>
          </tr>`;
      }).join("");

      tbody.innerHTML = html;
    }

    /* ================================================
       INITIALISE UI WITH A FULL PAYLOAD
    ================================================ */
    function initUI(payload) {
      allContributors      = payload.contributors || [];
      filteredContributors = allContributors.slice();

      renderSummary(payload);
      renderTable(filteredContributors);

      /* Re-enable search */
      const input = document.getElementById("search-input");
      input.disabled = false;
      input.value    = "";
    }

    /* ================================================
       REAL-TIME SEARCH FILTER
    ================================================ */
    document.getElementById("search-input").addEventListener("input", function () {
      const q = this.value.trim().toLowerCase();
      filteredContributors = q
        ? allContributors.filter(c => c.family.toLowerCase().includes(q))
        : allContributors.slice();
      renderTable(filteredContributors);
    });

    /* ================================================
       MAIN DATA LOADER
       Fetches from the Apps Script web app.
       On failure, falls back to localStorage cache.
    ================================================ */
    async function loadData() {
      showLoadingState();
      hideErrorBanner();

      const isConfigured = true; // endpoint is set

      if (!isConfigured) {
        /* Endpoint not yet set — show a clear notice */
        showErrorBanner("The data endpoint has not been configured yet. Set APPS_SCRIPT_URL in the script.");
        const cached = readCache();
        if (cached) {
          initUI(cached);
        } else {
          /* Nothing to show at all */
          renderTable([]);
          ["val-collected", "val-spent", "val-pending", "val-balance"].forEach(id => {
            document.getElementById(id).textContent = "—";
          });
          document.getElementById("sub-collected").textContent = "no data";
          document.getElementById("search-input").disabled = false;
        }
        return;
      }

      try {
        const controller = new AbortController();
        const timeout    = setTimeout(() => controller.abort(), 12000); /* 12 s timeout */

        const res = await fetch(APPS_SCRIPT_URL, {
          method: "GET",
          signal: controller.signal,
        });
        clearTimeout(timeout);

        if (!res.ok) throw new Error(`Server returned ${res.status}`);

        const payload = await res.json();

        /* Validate minimum expected shape */
        if (!payload || typeof payload !== "object" || !Array.isArray(payload.contributors)) {
          throw new Error("Unexpected response format from endpoint.");
        }

        writeCache(payload);   /* persist fresh data for future fallback */
        hideErrorBanner();
        initUI(payload);

      } catch (err) {
        console.warn("Fetch failed:", err.message);

        const cached = readCache();
        if (cached) {
          showErrorBanner("Showing the last successfully cached values.");
          initUI(cached);
        } else {
          showErrorBanner("No cached data available. Please check your connection and try again.");
          renderTable([]);
          ["val-collected", "val-spent", "val-pending", "val-balance"].forEach(id => {
            document.getElementById(id).textContent = "—";
          });
          document.getElementById("sub-collected").textContent = "no data";
          document.getElementById("search-input").disabled = false;
        }
      }
    }

    /* ================================================
       BOOT
    ================================================ */
    loadData();
  </script>

</body>
</html>
