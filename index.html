<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Together 2026</title>
<link rel="icon" type="image/png" href="aug8.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F6F4EE;--primary:#234B43;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{
min-height:100vh;display:flex;justify-content:center;align-items:center;
background-image:url("bg.jpg");background-size:cover;background-position:center;background-repeat:no-repeat;background-attachment:fixed;
overflow:hidden;position:relative;}
body::before{content:"";position:fixed;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.10),rgba(255,255,255,.03));pointer-events:none;}
.container{width:100%;max-width:700px;padding:30px;text-align:center;animation:fadeIn 1s ease;}
h1{color:#302F2F;font-size:3.2rem;font-weight:800;letter-spacing:1px;margin-bottom:30px;text-shadow:0 2px 8px rgba(0,0,0,.45),0 12px 30px rgba(0,0,0,.25);}
#countdown{color:#302F2F;margin-bottom:40px;font-weight:600;text-shadow:0 2px 8px rgba(0,0,0,.45);}
.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;}
.card{
position:relative;text-decoration:none;color:var(--primary);
background:linear-gradient(135deg,rgba(255,255,255,.38),rgba(255,255,255,.12));
backdrop-filter:blur(30px) saturate(180%);-webkit-backdrop-filter:blur(30px) saturate(180%);
border:1px solid rgba(255,255,255,.30);padding:22px;border-radius:24px;
font-size:1.1rem;font-weight:500;overflow:hidden;
box-shadow:0 8px 32px rgba(0,0,0,.12),inset 0 1px 1px rgba(255,255,255,.45),inset 0 -1px 1px rgba(255,255,255,.08);
transition:transform .35s ease,box-shadow .35s ease,background .35s ease;}
.card:hover{transform:translateY(-8px) scale(1.03);}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@media(max-width:768px){
h1{font-size:2.2rem;}
.container{padding:20px;}
.cards{grid-template-columns:repeat(2,1fr);gap:15px;}
.card{padding:18px;font-size:1rem;}
}
</style>
</head>
<body>
<div class="container">
<h1>Get-together 2026</h1>
<div id="countdown">
<div></div>
<div id="timer"></div>
</div>
<div class="cards">
<a href="invitation.html" class="card"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" 
                                         stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-mail-icon lucide-mail">
  <path d="m22 7-8.991 5.727a2 2 0 0 1-2.009 0L2 7"/>
  <rect x="2" y="4" width="20" height="16" rx="2"/>
</svg> Invitation</a>
  
<a href="contributions.html" class="card"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-hand-coins-icon lucide-hand-coins"><path d="M11 15h2a2 2 0 1 0 0-4h-3c-.6 0-1.1.2-1.4.6L3 17"/><path d="m7 21 1.6-1.4c.3-.4.8-.6 1.4-.6h4c1.1 0 2.1-.4 2.8-1.2l4.6-4.4a2 2 0 0 0-2.75-2.91l-4.2 3.9"/><path d="m2 16 6 6"/><circle cx="16" cy="9" r="2.9"/><circle cx="6" cy="5" r="3"/></svg> Contributions</a>
  
<a href="expenses.html" class="card"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-wallet-icon lucide-wallet"><path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1"/><path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"/></svg> Expenses</a>
  
<a href="abstract.html" class="card"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" 
                                       stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chart-no-axes-combined-icon lucide-chart-no-axes-combined"><path d="M12 16v5"/><path d="M16 14.639V21"/><path d="M20 10.656V21"/><path d="m22 3-8.646 8.646a.5.5 0 0 1-.708 0L9.354 8.354a.5.5 0 0 0-.707 0L2 15"/><path d="M4 18.463V21"/><path d="M8 14.656V21"/></svg> Summary</a>
  
<a href="venue.html" class="card"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-map-pin-icon lucide-map-pin"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg> Venue</a>
  
<a href="schedule.html" class="card"><img src="aug8.png" alt="custom emoji" width="23" height="23"> Schedule</a>

<a href="info.html" class="card"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-info-icon lucide-info"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg> Other info </a>
  
</div></div>
<script>
const eventDate=new Date("August 08, 2026 09:00:00").getTime();
function updateCountdown(){
const now=new Date().getTime(),d=eventDate-now;
if(d<=0){timer.innerHTML="🎉 The Reunion Has Begun!";return;}
const days=Math.floor(d/86400000);
const hrs=Math.floor((d%86400000)/3600000);
const mins=Math.floor((d%3600000)/60000);
const secs=Math.floor((d%60000)/1000);
timer.innerHTML=`${days}d ${hrs}h ${mins}m ${secs}s`;
}
updateCountdown();setInterval(updateCountdown,1000);
</script>
</body></html>
